<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luận giải chi tiết - Lịch Việt</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #169172;
            --bg-light: #F5F7FA;
            --card-bg: #FFFFFF;
            --text-main: #333333;
            --text-secondary: #666666;
            --border-color: #E5E7EB;
            --emerald: #10B981;
            --ruby: #EF4444;
        }

        body {
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-main);
        }

        /* Mobile Device Mockup */
        .phone-mockup {
            position: relative;
            width: 414px;
            height: 896px;
            background: #1F1F1F;
            border-radius: 56px;
            padding: 12px;
            box-shadow:
                0 0 0 2px #333,
                0 20px 50px rgba(0, 0, 0, 0.2),
                0 0 0 12px #111;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .buttons-left {
            position: absolute;
            left: -14px;
            top: 180px;
            width: 4px;
            height: 100px;
            background: #111;
            border-radius: 4px 0 0 4px;
            box-shadow: -1px 0 2px rgba(255, 255, 255, 0.1);
        }

        .buttons-right {
            position: absolute;
            right: -14px;
            top: 200px;
            width: 4px;
            height: 80px;
            background: #111;
            border-radius: 0 4px 4px 0;
            box-shadow: 1px 0 2px rgba(255, 255, 255, 0.1);
        }

        .status-bar {
            height: 44px;
            background-color: var(--primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px 0 32px;
            font-size: 14px;
            font-weight: 600;
            color: white;
            z-index: 101;
        }

        .status-icons {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .screen-content {
            width: 100%;
            height: 100%;
            background-color: var(--bg-light);
            border-radius: 44px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Hide Mockup on real Mobile */
        @media (max-width: 500px) {
            body {
                background: var(--bg-light);
                display: block;
            }

            .phone-mockup {
                width: 100%;
                height: 100vh;
                padding: 0;
                border-radius: 0;
                box-shadow: none;
                background: none;
                display: block;
            }

            .screen-content {
                border-radius: 0;
            }

            .status-bar,
            .buttons-left,
            .buttons-right {
                display: none;
            }
        }

        /* App Bar */
        .app-bar {
            background-color: var(--primary);
            color: white;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 16px;
            font-size: 17px;
            font-weight: 500;
            z-index: 10;
            position: relative;
            flex-shrink: 0;
        }

        .app-bar .back-btn {
            position: absolute;
            left: 8px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 50%;
            transition: background 0.2s;
            color: white;
            text-decoration: none;
        }

        .app-bar .back-btn:active {
            background: rgba(255, 255, 255, 0.2);
        }

        .app-bar .share-btn {
            position: absolute;
            right: 8px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 50%;
            transition: background 0.2s;
            color: white;
            text-decoration: none;
        }

        .app-bar .share-btn:active {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Tab Bar Navigation */
        .tabs-container {
            padding: 0 16px;
            margin: 12px 0;
            display: flex;
            gap: 8px;
            flex-shrink: 0;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .tabs-container::-webkit-scrollbar {
            display: none;
        }

        .tab-btn {
            flex: 1;
            padding: 10px 10px;
            font-size: 12.5px;
            font-weight: 600;
            color: #64748B;
            background-color: #FFFFFF;
            border: 1.5px solid #E2E8F0;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tab-btn .tab-icon {
            font-size: 20px;
            flex-shrink: 0;
        }

        .tab-btn .tab-text {
            display: flex;
            flex-direction: column;
            line-height: 1.3;
        }

        .tab-btn .tab-label {
            font-weight: 700;
            font-size: 13px;
            color: #1F2937;
            white-space: nowrap;
        }

        .tab-btn .tab-sub {
            font-size: 11px;
            font-weight: 500;
            color: #9CA3AF;
        }

        .tab-btn.active {
            background-color: #E6F7F1;
            border-color: #169172;
        }

        .tab-btn.active .tab-label {
            color: #0F5D49;
        }

        .tab-btn.active .tab-sub {
            color: #169172;
            font-weight: 600;
        }

        /* Content Area */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 0 16px 16px 16px;
            box-sizing: border-box;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        /* Rating Banner */
        .rating-banner {
            background: linear-gradient(135deg, #8B5CF6 0%, #A78BFA 100%);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 4px 14px rgba(139, 92, 246, 0.2);
        }

        .rating-banner .trophy-icon {
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }

        .rating-banner .rating-info {
            flex: 1;
        }

        .rating-banner .rating-label {
            font-size: 13px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.85);
            margin-bottom: 4px;
        }

        .rating-banner .rating-value {
            font-size: 26px;
            font-weight: 800;
            color: #FFFFFF;
            letter-spacing: -0.5px;
        }

        /* Detail Card (individual) */
        .detail-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 14px;
            border: 1px solid var(--border-color);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
        }

        .detail-card-header {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 14px;
        }

        .detail-card-icon {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 800;
            color: white;
            background: var(--primary);
            flex-shrink: 0;
        }

        .detail-card-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-main);
            line-height: 1.35;
            padding-top: 3px;
        }

        .detail-card-body {
            padding: 0;
        }

        .detail-card-desc {
            font-size: 14.5px;
            line-height: 1.6;
            color: #374151;
            margin-bottom: 12px;
        }

        .detail-bullet {
            font-size: 14.5px;
            line-height: 1.6;
            color: #374151;
            padding-left: 0;
            margin: 0 0 8px 0;
            display: flex;
            gap: 8px;
        }

        .detail-bullet:last-child {
            margin-bottom: 0;
        }

        .bullet-icon {
            font-weight: 700;
            flex-shrink: 0;
            display: inline-block;
            width: 14px;
        }

        .bullet-icon.positive {
            color: var(--primary);
        }

        .bullet-icon.negative {
            color: #EF4444;
        }

        .bullet-icon.default {
            color: #9CA3AF;
        }

        /* Group Tag (Điểm mạnh/Điểm yếu labels) */
        .detail-group-tag {
            display: inline-block;
            font-size: 14.5px;
            font-weight: 700;
            padding: 0;
            margin: 14px 0 8px 0;
        }

        .detail-group-tag:first-child {
            margin-top: 0;
        }

        .detail-group-tag.positive {
            color: var(--primary);
            background: transparent;
        }

        .detail-group-tag.negative {
            color: #EF4444;
            background: transparent;
        }

        /* Section wrapper (hidden, used for tab switching) */
        .section-panel {
            scroll-margin-top: 10px;
        }

        /* Section Title (used for Explore More heading) */
        .section-title {
            font-size: 17px;
            font-weight: 700;
            color: var(--text-main);
            margin: 0;
        }

        /* Explore More Section Stylings */
        .explore-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px 8px;
            margin-top: 16px;
            padding: 0 4px;
        }

        .explore-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            cursor: pointer;
            text-decoration: none;
        }

        .explore-icon-wrapper {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            box-shadow: inset 0 -4px 8px rgba(0, 0, 0, 0.1), 0 4px 10px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s;
            position: relative;
            overflow: hidden;
        }

        .explore-item:active .explore-icon-wrapper {
            transform: scale(0.92);
        }

        .explore-icon {
            font-size: 28px;
            line-height: 1;
            z-index: 1;
        }

        .explore-text {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-main);
            line-height: 1.4;
        }
    </style>
</head>

<body>

        let activeAgeGroup = '31-40';

        function loadDetail() {
            // 1. Parse parameters
            const urlParams = new URLSearchParams(window.location.search);
            const dob = urlParams.get('dob') || '2009-08-16';
            const tob = urlParams.get('tob') || '09:30';
            const gender = urlParams.get('gender') || 'nam';
            const targetSection = parseInt(urlParams.get('section')) || 0;

            // Set up back button with correct parameters
            const backBtn = document.getElementById('back-btn');
            backBtn.href = `tuvi_nghenghiep.html?dob=${encodeURIComponent(dob)}&tob=${encodeURIComponent(tob)}&gender=${encodeURIComponent(gender)}`;

            // 2. Compute age group
            const birthYear = parseInt(dob.split('-')[0]) || 2009;
            const targetYear = 2026;
            const age = targetYear - birthYear;

            if (age <= 18) {
                activeAgeGroup = '16-18';
            } else if (age >= 19 && age <= 23) {
                activeAgeGroup = '19-23';
            } else if (age >= 24 && age <= 30) {
                activeAgeGroup = '24-30';
            } else {
                activeAgeGroup = '31-40';
            }

            const data = HOROSCOPE_DETAILS[activeAgeGroup];

            // 3. Update dynamic Tab titles
            const tabsContainer = document.getElementById('tabs-container');
            const icons = [data.tabIcon1 || '👤', data.tabIcon2 || '📚', data.tabIcon3 || '🎯'];
            const tabNames = [data.tab1, data.tab2, data.tab3];
            const tabSubs = [data.tabSub1 || '', data.tabSub2 || '', data.tabSub3 || ''];
            tabsContainer.innerHTML = icons.map((icon, i) => `
                <button class="tab-btn${i === 0 ? ' active' : ''}" id="tab-${i}" onclick="switchTab(${i})">
                    <span class="tab-icon">${icon}</span>
                    <span class="tab-text">
                        <span class="tab-label">${tabNames[i]}</span>
                        <span class="tab-sub">${tabSubs[i]}</span>
                    </span>
                </button>
            `).join('');

            // 4. Render details content
            for (let i = 0; i < 3; i++) {
                const sectionItems = data.sections[i].items;
                let html = '';

                // Render items as individual cards
                sectionItems.forEach((item, idx) => {
                    let bodyHtml = '';

                    if (item.desc) {
                        bodyHtml += `<div class="detail-card-desc">${item.desc}</div>`;
                    }

                    if (item.groups) {
                        // Groups format (Điểm mạnh/Điểm yếu, Thuận lợi/Khó khăn)
                        item.groups.forEach(group => {
                            const icon = group.type === 'positive' ? '✨' : '⚠️';
                            const tagClass = group.type === 'positive' ? 'detail-group-tag positive' : 'detail-group-tag negative';
                            const bulletsHtml = group.bullets.map(b => {
                                const bulletIcon = group.type === 'positive' ? '<span class="bullet-icon positive">✓</span>' : '<span class="bullet-icon negative">•</span>';
                                return `<div class="detail-bullet">${bulletIcon}<span>${b}</span></div>`;
                            }).join('');
                            bodyHtml += `<div class="${tagClass}">${icon} ${group.label}</div>${bulletsHtml}`;
                        });
                    } else if (item.bullets) {
                        // Simple bullet-point format
                        bodyHtml += item.bullets.map(b => `<div class="detail-bullet"><span class="bullet-icon default">•</span><span>${b}</span></div>`).join('');
                    } else {
                        // Legacy html format (19-23, 24-30, 31-40)
                        bodyHtml += item.html;
                    }

                    html += `
                        <div class="detail-card">
                            <div class="detail-card-header">
                                <div class="detail-card-icon">${idx + 1}</div>
                                <div class="detail-card-title">${item.title}</div>
                            </div>
                            <div class="detail-card-body">
                                ${bodyHtml}
                            </div>
                        </div>
                    `;
                });
                document.getElementById(`section-${i}-items`).innerHTML = html;
            }

            // 5. Switch to targeted tab on load
            switchTab(targetSection);
        }

        // Switch between independent tabs
        function switchTab(index) {
            // Update sections display state
            for (let i = 0; i < 3; i++) {
                const sectionEl = document.getElementById(`section-${i}`);
                if (sectionEl) {
                    if (i === index) {
                        sectionEl.style.display = 'block';
                    } else {
                        sectionEl.style.display = 'none';
                    }
                }
            }
 
            // Update active tab styling
            const tabs = document.querySelectorAll('.tab-btn');

            tabs.forEach((tab, tIdx) => {
                if (tIdx === index) {
                    tab.classList.add('active');
                    tab.style.backgroundColor = '#E6F7F1';
                    tab.style.borderColor = '#169172';
                    tab.style.boxShadow = '0 2px 6px rgba(22, 145, 114, 0.12)';
                    tab.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
                } else {
                    tab.classList.remove('active');
                    tab.style.backgroundColor = '#FFFFFF';
                    tab.style.borderColor = '#E2E8F0';
                    tab.style.boxShadow = 'none';
                }
            });
 
            // Update App Bar title to match the active section's full title
            const data = HOROSCOPE_DETAILS[activeAgeGroup];
            const appBarTitle = document.querySelector('.app-bar .title');
            if (appBarTitle && data) {
                if (index === 0) appBarTitle.innerText = data.title1;
                else if (index === 1) appBarTitle.innerText = data.title2;
                else if (index === 2) appBarTitle.innerText = data.title3;
            }

            // Scroll container back to top when switching tab
            const scrollContainer = document.getElementById('detail-content');
            if (scrollContainer) {
                scrollContainer.scrollTop = 0;
            }
        }

        function shareResult() {
            if (navigator.share) {
                navigator.share({
                    title: 'Tử vi nghề nghiệp Lịch Việt',
                    text: 'Xem luận giải chi tiết tử vi nghề nghiệp và sự nghiệp của tôi!',
                    url: window.location.href
                }).catch(err => console.log(err));
            } else {
                navigator.clipboard.writeText(window.location.href).then(() => {
                    alert('Đã sao chép liên kết chia sẻ vào bộ nhớ tạm!');
                }).catch(err => {
                    alert('Không thể sao chép liên kết.');
                });
            }
        }

        // Initialize on load
        window.addEventListener('DOMContentLoaded', loadDetail);
    </script>
</body>

</html>
