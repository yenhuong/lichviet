<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập mua gói - Lịch Việt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .phone-container {
            width: 375px; height: 812px;
            background-color: white; border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden; position: relative; border: 8px solid #1e293b;
            display: flex; flex-direction: column;
        }
        
        .sky-bg {
            background: linear-gradient(180deg, #d3efff 0%, #ffffff 100%);
            height: 165px; width: 100%; position: relative;
            display: flex; justify-content: center; align-items:flex-end;
            padding-bottom: 20px;
        }
        
        /* Cloud shapes */
        .cloud-bg {
            position: absolute; bottom: -20%; left: -20%; right: -20%; height: 100px;
            background: radial-gradient(circle at 50% 100%, white, transparent 70%);
            filter: blur(10px);
        }

        .shield-icon {
            font-size: 60px; position: relative; z-index: 10;
            filter: drop-shadow(0 10px 15px rgba(234, 179, 8, 0.4));
            line-height: 1; transform: translateY(10px);
        }
        
        .coins-icon {
            font-size: 32px; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
            z-index: 5; opacity: 0.9;
        }
        
        .social-btn {
            display: flex; align-items: center; justify-content: flex-start; gap: 16px;
            width: 100%; padding: 16px 24px; border-radius: 99px;
            font-weight: 600; font-size: 16px; cursor: pointer; transition: all 0.2s;
            border: 1px solid #e2e8f0; background: white; color: #1e293b;
            box-shadow: 0 1px 2px rgba(0,0,0,0.01);
        }
        
        .social-btn:active { transform: scale(0.98); background: #f8fafc; }
    </style>
</head>
<body>
    <div class="phone-container">
        <!-- Nút Back tạm ẩn cho giống thiết kế -->
        
        <!-- Illustration Area (Sky, Shield, Coins) -->
        <div class="sky-bg shrink-0 overflow-hidden relative">
            <div class="cloud-bg"></div>
            <!-- Thay vì ảnh thật, dùng Emoji minh hoạ Shield + Coins -->
            <div class="relative w-full h-full flex justify-center items-end pb-4 z-10">
                <div class="coins-icon">🪙🪙🪙</div>
                <div class="shield-icon relative">
                    🛡️
                    <!-- Silver Badge -->
                    <div class="absolute -top-1 -right-2 z-20">
                        <svg class="w-[28px] h-[28px] text-gray-300"
                            style="filter: drop-shadow(0px 2px 3px rgba(100, 110, 140, 0.3)); stroke: #9CA3AF; stroke-width: 0.5px;"
                            viewBox="0 0 24 24" fill="currentColor">
                            <path
                                d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" />
                        </svg>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Content Area -->
        <div class="flex-1 px-6 flex flex-col relative z-20 bg-white -mt-2">
            
            <!-- Tiêu đề & Phụ đề -->
            <div class="text-center pt-2 mb-6">
                <h1 class="text-[19px] font-bold text-[#1a5b8f] mb-3 tracking-tight">ĐĂNG NHẬP ĐỂ TIẾP TỤC MUA</h1>
                <p class="text-gray-700 text-[16px] leading-[1.45] mx-auto font-medium px-2">
                    Lưu gói đã mua và sử dụng trên mọi thiết bị
                </p>
            </div>

            <!-- Package Badge -->
            <div class="flex justify-center mb-8">
                <span class="bg-gray-100 text-gray-500 font-medium text-[13px] px-4 py-1.5 rounded-full">
                    Bạn đang đăng ký gói Bạc trọn đời
                </span>
            </div>

            <!-- Nút Action -->
            <div class="flex flex-col gap-3.5 w-full">
                <!-- Zalo -->
                <button class="social-btn" onclick="alert('Đăng nhập Zalo...')">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/91/Icon_of_Zalo.svg/1024px-Icon_of_Zalo.svg.png" alt="Zalo" class="w-[26px] h-[26px]">
                    <span class="ml-2">Tiếp tục với Zalo</span>
                </button>

                <!-- Google -->
                <button class="social-btn" onclick="alert('Đăng nhập Google...')">
                    <svg class="w-[26px] h-[26px]" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    <span class="ml-2">Tiếp tục với Google</span>
                </button>

                <!-- Apple -->
                <button class="social-btn" onclick="alert('Đăng nhập Apple...')">
                    <svg class="w-[26px] h-[26px] text-black" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm3.308 13.918c-.89.049-1.921-.433-2.482-1.026-.64-.672-1.1-1.637-.962-2.585.932-.066 1.884.453 2.457 1.11.536.609.919 1.488.828 2.378l.159.123zM14.996 11.233c-.021.018-1.503.882-1.464 2.628.043 1.968 1.83 2.673 1.87 2.69-.028.1-.286.992-.931 1.94-.555.815-1.139 1.62-2.039 1.638-.88.016-1.171-.527-2.18-.527-1.01 0-1.32.51-2.164.545-.88.035-1.554-.878-2.13-1.692-1.17-1.705-2.062-4.81-1.464-7.294.288-1.189 1.057-2.073 1.986-2.51.873-.41 1.815-.028 2.302-.028.5 0 1.258-.456 2.012-.416.32-.016 1.98.058 3.129 1.66l-.053.07z"/>
                    </svg>
                    <span class="ml-2">Tiếp tục với Apple</span>
                </button>
            </div>

            <!-- Cảnh báo bảo mật -->
            <div class="mt-4 flex items-center justify-center gap-1.5 text-gray-400 text-[13px] font-medium">
                <span>🔒</span>
                <span>Bảo mật thông tin &ndash; không chia sẻ bên thứ ba</span>
            </div>

            <!-- Footer (Điều khoản) -->
            <div class="mt-auto pb-8 w-full flex flex-col items-center px-4">
                <p class="text-center text-[12px] text-gray-500 leading-[1.5] max-w-[300px]">
                    Bằng việc tiếp tục, bạn đồng ý với <a href="#" class="text-[#2563EB] font-medium hover:underline">Điều khoản dịch vụ</a> và <a href="#" class="text-[#2563EB] font-medium hover:underline">Chính sách bảo mật</a> của chúng tôi
                </p>
            </div>
            
        </div>
    </div>
</body>
</html>
